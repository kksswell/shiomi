services:
  db:
    image: postgres:16-alpine
    container_name: vania_sait_db_prod
    restart: unless-stopped
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      args:
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.org/simple}
    image: vania_sait-backend:latest
    container_name: vania_sait_backend_prod
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - backend_media:/app/media
      - backend_static:/app/staticfiles
    expose:
      - "8000"
    healthcheck:
      test: ["CMD-SHELL", "python - <<'PY'\nimport urllib.request\nurllib.request.urlopen('http://127.0.0.1:8000/api/health/ready/', timeout=3)\nPY"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      target: production
      args:
        NPM_CONFIG_REGISTRY: ${NPM_CONFIG_REGISTRY:-https://registry.npmjs.org/}
    image: vania_sait-frontend:latest
    container_name: vania_sait_frontend_prod
    restart: unless-stopped
    expose:
      - "80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null 2>&1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  nginx:
    image: nginx:1.27-alpine
    container_name: vania_sait_nginx_prod
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/default.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/certbot/www:/var/www/certbot:ro
      - ./deploy/certbot/conf:/etc/letsencrypt:ro
      - backend_media:/app/media:ro
      - backend_static:/app/staticfiles:ro

  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: vania_sait_uptime_kuma_prod
    restart: unless-stopped
    profiles: ["monitoring"]
    volumes:
      - uptime_kuma_data:/app/data
    ports:
      - "3001:3001"

volumes:
  postgres_data:
  backend_media:
  backend_static:
  uptime_kuma_data:
