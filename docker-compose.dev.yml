# Optional development override. Use only when you need hot reload:
# docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d --build
services:
  frontend:
    build:
      context: ./frontend
      target: development
      args:
        NPM_CONFIG_REGISTRY: ${NPM_CONFIG_REGISTRY:-https://registry.npmjs.org/}
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    expose:
      - "5173"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:5173/ >/dev/null 2>&1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  nginx:
    volumes:
      - ./deploy/nginx/default.vite.conf:/etc/nginx/conf.d/default.conf:ro
      - backend_media:/app/media:ro
      - backend_static:/app/staticfiles:ro

volumes:
  frontend_node_modules:
